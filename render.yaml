services:
  - type: web
    name: shop-vkhanh
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --keep-alive 5
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
